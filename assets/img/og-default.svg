<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#c8bfae" stroke-width="0.5" opacity="0.4"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#f4efe6"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Brand mark: closed-loop glyph, scaled up -->
  <g transform="translate(80,80)">
    <path d="M 22 0 A 22 22 0 1 1 0 22"
          fill="none" stroke="#1a1814" stroke-width="3.5"
          stroke-linecap="round"/>
    <path d="M 0 22 L 6 16 M 0 22 L 6 28"
          fill="none" stroke="#1a1814" stroke-width="3.5"
          stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="22" cy="22" r="6" fill="#b94a1b"/>
  </g>
  <text x="140" y="111" font-family="Fraunces, Georgia, serif" font-size="34" font-weight="500" fill="#1a1814" letter-spacing="0">Autonomy</text>

  <!-- Main headline -->
  <text x="80" y="305" font-family="Fraunces, Georgia, serif" font-size="92" font-weight="400" fill="#1a1814" letter-spacing="-2">Notes on control and</text>
  <text x="80" y="410" font-family="Fraunces, Georgia, serif" font-size="92" font-weight="300" font-style="italic" fill="#b94a1b" letter-spacing="-2">machine learning.</text>

  <!-- Subtle byline -->
  <g font-family="DM Mono, monospace" font-size="17" fill="#8a8277" letter-spacing="2">
    <text x="80" y="550">MAJID MAZOUCHI · WORKING NOTEBOOK</text>
  </g>

  <!-- Right-side decorative: step response curve with settling -->
  <g transform="translate(820,180)" fill="none" stroke="#b94a1b" stroke-width="2.5">
    <path d="M 0 240 L 40 240 Q 60 240 70 180 Q 85 90 110 90 Q 135 90 145 130 Q 155 160 175 150 Q 195 140 205 148 Q 225 160 250 150 Q 275 140 300 148"/>
  </g>
  <g transform="translate(820,180)" stroke="#1a1814" stroke-width="1.5">
    <line x1="0" y1="260" x2="310" y2="260"/>
    <line x1="0" y1="0" x2="0" y2="260"/>
  </g>
  <g transform="translate(820,180)" stroke="#c8bfae" stroke-width="0.8" stroke-dasharray="3,4">
    <line x1="0" y1="150" x2="310" y2="150"/>
  </g>
  <text x="820" y="175" font-family="DM Mono, monospace" font-size="12" fill="#8a8277" letter-spacing="1.5">STEP RESPONSE</text>
</svg>
