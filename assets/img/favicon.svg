<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Closed-loop feedback glyph — the signature of autonomy -->
  <rect x="0" y="0" width="32" height="32" rx="4" fill="#f4efe6"/>
  <!-- Outer loop: feedback arc from output back to summing junction -->
  <path d="M 16 6 A 10 10 0 1 1 6 16"
        fill="none" stroke="#1a1814" stroke-width="2"
        stroke-linecap="round"/>
  <!-- Arrowhead closing the loop -->
  <path d="M 6 16 L 9 13 M 6 16 L 9 19"
        fill="none" stroke="#1a1814" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Summing junction -->
  <circle cx="16" cy="16" r="3" fill="#b94a1b"/>
</svg>
