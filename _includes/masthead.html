<header class="masthead">
  <div class="mast-inner">
    <a href="{{ '/' | relative_url }}" class="brand">
      <span class="mark" aria-hidden="true"></span>
      <span>{{ site.title }}</span>
    </a>
    <nav class="primary" aria-label="Primary">
      <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>Home</a>
      <a href="{{ '/posts/' | relative_url }}"{% if page.url contains '/posts' %} class="active"{% endif %}>Posts</a>
      <a href="{{ '/categories/' | relative_url }}"{% if page.url contains '/categor' %} class="active"{% endif %}>Topics</a>
      <a href="{{ '/about/' | relative_url }}"{% if page.url contains '/about' %} class="active"{% endif %}>About</a>
    </nav>
  </div>
</header>
