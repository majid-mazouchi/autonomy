# Site settings
title: "Autonomy"
tagline: "Notes on control and machine learning"
description: "Personal engineering notes on control, motor control, machine learning, neural networks, and reinforcement learning — the stack under autonomous systems."
author: "Majid Mazouchi"
email: "Majid.Mazouchi@gmail.com"

# Deployed as a project site under majid-mazouchi.github.io
# The blog lives at https://majid-mazouchi.github.io/autonomy/
url: "https://majid-mazouchi.github.io"
baseurl: "/autonomy"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /posts/:slug/
timezone: America/Detroit

# Categories used across the site (keep in sync with post front-matter)
categories_list:
  - slug: control-systems
    name: "Control Systems"
    blurb: "PID, state-space, frequency domain, stability — the math that keeps things in line."
  - slug: motor-control
    name: "Motor Control"
    blurb: "DC, BLDC, stepper. FOC, commutation, encoders, current loops."
  - slug: robotics
    name: "Robotics"
    blurb: "Path planning, motion control, manipulation, and the geometry of getting somewhere."
  - slug: machine-learning
    name: "Machine Learning"
    blurb: "From linear regression to gradient boosting — the classical toolkit."
  - slug: neural-networks
    name: "Neural Networks"
    blurb: "Architectures, training dynamics, and the bits underneath the hype."
  - slug: reinforcement-learning
    name: "Reinforcement Learning"
    blurb: "Agents, rewards, policies. Where control theory and ML meet."
  - slug: tools
    name: "Tools"
    blurb: "Linux, git, terminals, dotfiles — the practical tooling that makes engineering work."

# Social / external links
social:
  github: "majid-mazouchi"
  linkedin: ""
  email: "Majid.Mazouchi@gmail.com"

# Collections / plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Default front-matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# Exclude from build
exclude:
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
