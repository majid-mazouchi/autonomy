---
layout: default
---
<section class="wrap">
  <div class="page-head readable">
    {% if page.kicker %}<div class="kicker">{{ page.kicker }}</div>{% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.blurb %}<p class="blurb">{{ page.blurb }}</p>{% endif %}
  </div>
  <div class="readable">
    {{ content }}
  </div>
</section>
